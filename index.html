        /* --- لۆجیکی لۆدینگ --- */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a0500;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease;
        }

        .loader-circle {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(212, 175, 55, 0.1);
            border-top: 5px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loader-text {
            margin-top: 20px;
            color: #d4af37;
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 3px;
            font-size: 14px;
            font-weight: bold;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .loader-hidden {
            opacity: 0;
            pointer-events: none;
        }
